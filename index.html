<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Helen of Troy — Retail Intelligence</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    header{display:flex;align-items:center;gap:16px}
    .brand{font-weight:700;color:#0b5394;font-size:20px}
    .meta{color:#666;font-size:13px}
  </style>
</head>
<body>
  <header>
    <img src="app_icon.png" alt="Helen of Troy" width="48" height="48" onerror="this.style.display='none'"/>
    <div>
      <div class="brand">Helen of Troy — Retail Intelligence</div>
      <div class="meta">Daily/weekly crawl of retail press and announcements</div>
    </div>
  </header>

  <div class="controls">
    <label>Date: <input type="date" id="date"></label>
    <label>Retailer:
      <select id="retailer">
        <option value="all">All</option>
        <option value="Amazon">Amazon</option>
        <option value="Walmart">Walmart</option>
        <option value="Target">Target</option>
        <option value="CVS">CVS</option>
        <option value="Walgreens">Walgreens</option>
      </select>
    </label>
    <label>Brand:
      <select id="brand">
        <option value="all">All</option>
      </select>
    </label>
    <label>Sort:
      <select id="sort">
        <option value="relevance">Grouped (topic relevance)</option>
        <option value="retailer">Retailer (A→Z)</option>
        <option value="category">Category</option>
        <option value="title">Title (A→Z)</option>
      </select>
    </label>
    <label>Mode:
      <select id="mode">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
      </select>
    </label>
    <button id="load">Load</button>
    <span id="status" style="margin-left:8px;color:#666"></span>
  </div>

  <div style="font-size:13px;color:#666;margin-bottom:8px">Tips: use <strong>Brand</strong> and <strong>Retailer</strong> to narrow results. <strong>Grouped</strong> sorts by topic clusters (useful to see where a retailer is focused). Filters auto-load as you change them.</div>

  <section id="takeaways" style="margin-bottom:24px"></section>

  <div class="layout">
    <aside id="sidebar">
      <h4>Top Topics</h4>
      <div id="topics"></div>
      <h4 style="margin-top:12px">Quick Filters</h4>
      <div id="quick-filters"></div>
    </aside>
    <main id="main">
      <div id="events"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
