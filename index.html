<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Helen of Troy — Retail Intelligence</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    header{display:flex;align-items:center;gap:16px}
    .brand{font-weight:700;color:#0b5394;font-size:20px}
    .meta{color:#666;font-size:13px}
  </style>
</head>
<body>
  <header>
    <img src="app_icon.png" alt="Helen of Troy" width="48" height="48" onerror="this.style.display='none'"/>
    <div>
      <div class="brand">Helen of Troy — Retail Intelligence</div>
      <div class="meta">Daily/weekly crawl of retail press and announcements</div>
    </div>
  </header>

  <div class="controls">
    <label>Date: <input type="date" id="date"></label>
    <label>Retailer:
      <select id="retailer">
        <option value="all">All</option>
        <option value="Amazon">Amazon</option>
        <option value="Walmart">Walmart</option>
        <option value="Target">Target</option>
        <option value="CVS">CVS</option>
        <option value="Walgreens">Walgreens</option>
      </select>
    </label>
    <label>Mode:
      <select id="mode">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
      </select>
    </label>
    <button id="load">Load</button>
    <span id="status" style="margin-left:8px;color:#666"></span>
  </div>

  <div id="events"></div>

  <script src="app.js"></script>
</body>
</html>
