name: Daily Retail Crawl

on:
  schedule:
    - cron: "0 11 * * *"  # Daily at 11 AM UTC (Tier 1)
    - cron: "0 6 * * MON,WED"  # Weekly Mon/Wed at 6 AM UTC (Tier 2/3)
  workflow_dispatch:
    inputs:
      tier:
        description: 'Crawl tier: 1 (daily), 2 (weekly), 3 (weekly), or all'
        required: false
        default: '1'
      mode:
        description: 'Run mode: daily or weekly'
        required: false
        default: 'daily'

permissions:
  contents: write

jobs:
  crawl_tier1:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=src" >> $GITHUB_ENV

      - name: Run Tier 1 crawler (daily)
        run: python -m build.run_daily --mode daily --tier ${{ github.event.inputs.tier || '1' }}

      - name: Commit data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "retail-intel-bot"
          git config user.email "bot@github.com"
          git add data || true
          git commit -m "Daily retail intelligence update (Tier 1)" || echo "No changes"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }} || echo "Push failed"

  crawl_tier2_3:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * MON,WED' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tier != '1')
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=src" >> $GITHUB_ENV

      - name: Run Tier 2 & 3 crawler (weekly)
        run: python -m build.run_daily --mode weekly --tier ${{ github.event.inputs.tier || '2' }}

      - name: Commit data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "retail-intel-bot"
          git config user.email "bot@github.com"
          git add data || true
          git commit -m "Weekly retail intelligence update (Tier 2 & 3)" || echo "No changes"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }} || echo "Push failed"
