name: Daily Retail Crawl

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: daily or weekly'
        required: false
        default: 'daily'

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=src" >> $GITHUB_ENV

      - name: Run crawler
        run: python -m build.run_daily --mode ${{ github.event.inputs.mode || 'daily' }}

      - name: Commit data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "retail-intel-bot"
          git config user.email "bot@github.com"
          # (previously copied data into docs/ for Pages) — now UI is at repo root so add data only
          git add data || true
          git commit -m "Daily retail intelligence update" || echo "No changes"
          # push using the provided token to ensure write access
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }} || echo "Push failed"
